<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>صناعة فارس</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Scheherazade+New:wght@400;600;700&family=Amiri:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    :root {
      --bg: #060509;
      --card-bg: #0d0b16;
      --gold: #c9943a;
      --gold-bright: #f0c060;
      --text: #e8d5a0;
      --muted: #7a6040
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Scheherazade New", serif;
      min-height: 100vh;
      overflow-x: hidden;
      direction: rtl;
      background-image: radial-gradient(ellipse 160% 55% at 50% 0%, rgba(80, 40, 160, .08) 0%, transparent 55%),
        radial-gradient(ellipse 50% 35% at 10% 90%, rgba(201, 148, 58, .05) 0%, transparent 50%),
        repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(255, 255, 255, .008) 80px),
        repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(255, 255, 255, .008) 80px)
    }

    header {
      text-align: center;
      padding: 4rem 1rem 2.5rem
    }

    header::before {
      content: "✦  ✦  ✦";
      display: block;
      color: var(--gold);
      font-size: .7rem;
      letter-spacing: 1.4em;
      margin-bottom: 1.3rem;
      opacity: .3
    }

    header h1 {
      font-family: "Scheherazade New", serif;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 700;
      color: var(--gold-bright);
      text-shadow: 0 0 100px rgba(240, 192, 96, .18), 0 0 40px rgba(240, 192, 96, .1), 0 4px 20px rgba(0, 0, 0, 1);
      line-height: 1.2
    }

    .sub {
      margin-top: .7rem;
      font-size: 1.1rem;
      color: var(--muted);
      font-family: "Amiri", serif;
      font-style: italic
    }

    .hdiv {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      margin-top: 2.2rem
    }

    .hdiv::before,
    .hdiv::after {
      content: "";
      flex: 1;
      max-width: 240px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201, 148, 58, .35), transparent)
    }

    .hdiv i {
      font-size: 1.2rem;
      color: rgba(201, 148, 58, .5);
      font-style: normal
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: .45rem;
      flex-wrap: wrap;
      padding: 0 2rem 2.5rem;
      max-width: 700px;
      margin: 0 auto
    }

    .lpill {
      font-family: "Scheherazade New", serif;
      font-size: .8rem;
      color: var(--muted);
      border: 1px solid rgba(255, 255, 255, .05);
      padding: 4px 14px;
      border-radius: 20px;
      background: rgba(255, 255, 255, .018)
    }

    .arena {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
      max-width: 1360px;
      margin: 0 auto 7rem;
      padding: 0 1.5rem
    }

    .card {
      --ca: #c9943a;
      --cg: rgba(201, 148, 58, .35);
      background: var(--card-bg);
      border: 1px solid rgba(255, 255, 255, .055);
      border-top: 2px solid var(--ca);
      border-radius: 10px;
      position: relative;
      transition: transform .3s ease, box-shadow .3s ease;
      box-shadow: 0 6px 35px rgba(0, 0, 0, .75);
      overflow: hidden
    }

    .card:hover {
      transform: translateY(-9px);
      box-shadow: 0 24px 70px rgba(0, 0, 0, .9), 0 0 50px var(--cg)
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 55px;
      background: linear-gradient(to bottom, rgba(255, 255, 255, .03), transparent);
      pointer-events: none;
      z-index: 1
    }

    .card-corner-tl,
    .card-corner-tr {
      position: absolute;
      top: 9px;
      font-size: .5rem;
      color: var(--ca);
      opacity: .5;
      z-index: 4;
      pointer-events: none
    }

    .card-corner-tl {
      right: 11px
    }

    .card-corner-tr {
      left: 11px
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.5rem .6rem;
      flex-direction: row-reverse;
      z-index: 2;
      position: relative
    }

    .char-name {
      font-family: "Scheherazade New", serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--ca)
    }

    .lv-badge {
      display: flex;
      align-items: baseline;
      gap: 4px;
      flex-direction: row-reverse;
      background: rgba(0, 0, 0, .45);
      border: 1px solid var(--ca);
      border-radius: 5px;
      padding: 3px 11px
    }

    .lv-lbl {
      font-family: "Scheherazade New", serif;
      font-size: .66rem;
      color: var(--muted)
    }

    .lv-num {
      font-family: "Cinzel Decorative", serif;
      font-size: 1.3rem;
      color: var(--gold-bright);
      text-shadow: 0 0 14px var(--cg)
    }

    /* ══ STAGE ══ */
    .stage {
      position: relative;
      height: 360px;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      background: #0a0810
    }

    .stage-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-size: cover;
      background-position: center 25%;
      transition: opacity .5s ease
    }

    .stage-bg.bg-out {
      animation: bgOut .3s ease forwards
    }

    .stage-bg.bg-in {
      animation: bgIn .55s ease forwards
    }

    @keyframes bgOut {
      from {
        opacity: 1
      }

      to {
        opacity: 0
      }
    }

    @keyframes bgIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    /* layered overlays for blending */
    .stage-ov {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(to top, rgba(6, 5, 9, .85) 0%, rgba(6, 5, 9, .3) 30%, rgba(6, 5, 9, .05) 55%, rgba(6, 5, 9, .12) 100%)
    }

    .stage-tf {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      z-index: 2;
      pointer-events: none;
      background: linear-gradient(to bottom, var(--card-bg) 0%, transparent 100%)
    }

    .stage-gl {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 90px;
      z-index: 2;
      pointer-events: none;
      background: radial-gradient(ellipse 85% 100% at 50% 100%, var(--cg) 0%, transparent 70%);
      opacity: .65
    }

    .stars {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden
    }

    .st {
      position: absolute;
      border-radius: 50%;
      background: rgba(240, 192, 96, .7);
      animation: tw var(--d, 3s) var(--dl, 0s) infinite ease-in-out
    }

    @keyframes tw {

      0%,
      100% {
        opacity: 0;
        transform: scale(.8)
      }

      50% {
        opacity: var(--op, .5);
        transform: scale(1)
      }
    }

    /* Character — z-index 5 to be ABOVE all overlays */
    .char-img {
      position: absolute;
      bottom: 0;
      max-height: 97%;
      width: auto;
      object-fit: contain;
      z-index: 5;
      filter: drop-shadow(0 6px 18px rgba(0, 0, 0, .65)) drop-shadow(0 2px 6px rgba(0, 0, 0, .85));
      transform-origin: bottom center
    }

    .xu {
      animation: xu .27s ease-in forwards
    }

    .xd {
      animation: xd .27s ease-in forwards
    }

    .eu {
      animation: eu .36s ease-out forwards
    }

    .ed {
      animation: ed .36s ease-out forwards
    }

    @keyframes xu {
      to {
        opacity: 0;
        transform: translateY(-60px) scale(.87)
      }
    }

    @keyframes xd {
      to {
        opacity: 0;
        transform: translateY(60px) scale(.87)
      }
    }

    @keyframes eu {
      from {
        opacity: 0;
        transform: translateY(60px) scale(.87)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    @keyframes ed {
      from {
        opacity: 0;
        transform: translateY(-60px) scale(.87)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .sweep {
      position: absolute;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      background: linear-gradient(115deg, transparent 22%, rgba(255, 255, 255, .12) 50%, transparent 78%);
      animation: swp .6s ease-out forwards
    }

    @keyframes swp {
      from {
        transform: translateX(-130%)
      }

      to {
        transform: translateX(130%)
      }
    }

    .gburst {
      position: absolute;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 55%, rgba(240, 192, 96, .25) 0%, transparent 60%);
      animation: gb .8s ease-out forwards
    }

    @keyframes gb {
      0% {
        opacity: 0
      }

      10% {
        opacity: 1
      }

      100% {
        opacity: 0
      }
    }

    .flv {
      position: absolute;
      left: 50%;
      bottom: 20%;
      z-index: 10;
      transform: translateX(-50%);
      white-space: nowrap;
      font-family: "Scheherazade New", serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #f0c060;
      text-shadow: 0 0 22px rgba(240, 192, 96, 1);
      pointer-events: none;
      animation: flva 1.2s ease-out forwards
    }

    @keyframes flva {
      0% {
        opacity: 0;
        bottom: 16%;
        transform: translateX(-50%) scale(.6)
      }

      16% {
        opacity: 1;
        transform: translateX(-50%) scale(1.25)
      }

      58% {
        opacity: 1
      }

      100% {
        opacity: 0;
        bottom: 74%;
        transform: translateX(-50%) scale(.8)
      }
    }

    .lv-title {
      text-align: center;
      padding: .85rem 1rem .25rem;
      font-family: "Scheherazade New", serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      min-height: 2.4rem;
      transition: color .4s
    }

    .stats {
      padding: .55rem 1.5rem .9rem;
      border-top: 1px solid rgba(255, 255, 255, .04);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 1.2rem;
      direction: rtl
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .sh {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-direction: row-reverse
    }

    .sl {
      font-family: "Scheherazade New", serif;
      font-size: .72rem;
      color: var(--muted)
    }

    .sv {
      font-family: "Cinzel Decorative", serif;
      font-size: .63rem;
      color: var(--text)
    }

    .sb {
      height: 4px;
      background: rgba(255, 255, 255, .05);
      border-radius: 2px;
      overflow: hidden
    }

    .sf {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--ca), var(--gold-bright));
      transition: width .6s cubic-bezier(.4, 0, .2, 1)
    }

    .ctrl {
      display: flex;
      align-items: center;
      gap: .8rem;
      padding: .9rem 1.5rem 1.3rem;
      border-top: 1px solid rgba(255, 255, 255, .04);
      flex-direction: row-reverse
    }

    .btn {
      flex: 1;
      padding: .7rem 0;
      background: transparent;
      border: 1px solid var(--ca);
      color: var(--ca);
      font-family: "Scheherazade New", serif;
      font-size: .95rem;
      cursor: pointer;
      border-radius: 5px;
      transition: all .2s
    }

    .btn:hover:not(:disabled) {
      background: var(--ca);
      color: #060509;
      transform: translateY(-2px);
      box-shadow: 0 5px 20px var(--cg)
    }

    .btn:active:not(:disabled) {
      transform: translateY(0)
    }

    .btn:disabled {
      opacity: .15;
      cursor: not-allowed;
      transform: none
    }

    .pips {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
      min-width: 60px;
      direction: ltr
    }

    .pip {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      border: 1px solid rgba(201, 148, 58, .3);
      background: transparent;
      transition: all .35s
    }

    .pip.on {
      background: var(--ca);
      border-color: var(--ca);
      box-shadow: 0 0 9px var(--cg)
    }

    .pip.done {
      background: rgba(201, 148, 58, .3);
      border-color: rgba(201, 148, 58, .3)
    }

    @media(max-width:640px) {
      .arena {
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
        padding: 0 .8rem
      }

      .stage {
        height: 240px
      }

      .stats {
        grid-template-columns: 1fr
      }

      header h1 {
        font-size: 2rem
      }
    }

    @media(max-width:420px) {
      .arena {
        grid-template-columns: 1fr
      }
    }

    ::-webkit-scrollbar {
      width: 6px
    }

    ::-webkit-scrollbar-track {
      background: #060509
    }

    ::-webkit-scrollbar-thumb {
      background: #1e1a2e;
      border-radius: 3px
    }

    /* ══ GROUP HEADER ══ */
    .group-header {
      grid-column: 1/-1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      padding: 1rem 0 .5rem;
      margin-top: 1rem;
    }

    .group-header::before,
    .group-header::after {
      content: "";
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: .4;
    }

    .group-header h2 {
      font-family: "Scheherazade New", serif;
      font-size: clamp(1.4rem, 3vw, 2rem);
      font-weight: 700;
      color: var(--gold-bright);
      white-space: nowrap;
      text-shadow: 0 0 30px rgba(240, 192, 96, .25);
      letter-spacing: .05em;
    }

    .group-header span {
      color: var(--gold);
      font-size: 1rem;
      opacity: .6
    }
  </style>
</head>

<body>
  <header>
    <h1>⚔ صناعة فارس ⚔</h1>
    <p class="sub">ثلاث فرق · واحد وعشرون بطلاً · خمسة مراحل من المجد</p>
    <div class="hdiv"><i>☽</i></div>
  </header>
  <div class="legend">
    <div class="lpill">م١ — تائه </div>

  </div>

    const SK = ["القوة", "الدفاع", "السرعة", "القدرة"];
    const AR = n => String(n).replace(/[0-9]/g, d => "٠١٢٣٤٥٦٧٨٩"[d]);
    const MAX = 4;
    const arena = document.getElementById("arena");
    const states = CHARS.map(() => ({ lv: 0, prev: 0 }));
    function addStars(el) {
      const w = document.createElement("div"); w.className = "stars";
      for (let i = 0; i < 22; i++) { const s = document.createElement("div"); s.className = "st"; const sz = Math.random() * 2 + .8; s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random() * 100}%;top:${Math.random() * 72}%;--d:${(Math.random() * 3 + 1.8).toFixed(1)}s;--dl:${(Math.random() * 4).toFixed(1)}s;--op:${(Math.random() * .55 + .15).toFixed(2)}`; w.appendChild(s); }
      el.appendChild(w);
    }
    // Group header injection
    let lastGroup = null;
    CHARS.forEach((ch, i) => {
      if (ch.group && ch.group !== lastGroup) {
        lastGroup = ch.group;
        const hdr = document.createElement("div");
        hdr.className = "group-header";
        const groupLabel = ch.group === 'شجعان' ? 'فرقة شجعان' : ch.group === 'حكماء' ? 'فرقة حكماء' : 'فرقة أمناء';
        hdr.innerHTML = `<span>⚔</span><h2>${groupLabel}</h2><span>⚔</span>`;
        hdr.style.gridColumn = "1 / -1";
        arena.appendChild(hdr);
      }
      const card = document.createElement("div");
      card.className = "card";
      card.style.setProperty("--ca", ch.ca);
      card.style.setProperty("--cg", ch.cg);
      const sr = SK.map(k => `<div class="stat"><div class="sh"><span class="sl">${k}</span><span class="sv" id="sv${i}${k}">—</span></div><div class="sb"><div class="sf" id="sf${i}${k}" style="width:0%"></div></div></div>`).join("");
      card.innerHTML = `
    <div class="card-corner-tl">◆</div><div class="card-corner-tr">◆</div>
    <div class="card-header">
      <div class="char-name">${ch.name}</div>
      <div class="lv-badge"><span class="lv-lbl">المستوى</span><span class="lv-num" id="ln${i}">١</span></div>
    </div>
    <div class="stage" id="stg${i}">
      <div class="stage-bg" id="bg${i}" style="background-image:url('${BGS[0]}')"></div>
      <div class="stage-ov"></div>
      <div class="stage-tf"></div>
      <div class="stage-gl" style="background:radial-gradient(ellipse 85% 100% at 50% 100%,${ch.cg} 0%,transparent 70%)"></div>
      <img class="char-img" id="img${i}" src="${ch.levels[0].img}" alt="">
    </div>
    <div class="lv-title" id="lt${i}">${ch.levels[0].title}</div>
    <div class="stats">${sr}</div>
    <div class="ctrl">
      <button class="btn" id="bu${i}" onclick="go(${i},1)">ترقية ▲</button>
      <div class="pips" id="pp${i}"></div>
      <button class="btn" id="bd${i}" onclick="go(${i},-1)">▼ تخفيض</button>
    </div>`;
      arena.appendChild(card);
      addStars(document.getElementById("stg" + i));
      const pr = card.querySelector("#pp" + i);
      for (let p = 0; p <= MAX; p++) { const pip = document.createElement("div"); pip.id = "pip" + i + "_" + p; pr.appendChild(pip); }
      sync(i);
    });
    function sync(i) {
      const ch = CHARS[i], s = states[i], lv = s.lv, L = ch.levels[lv];
      document.getElementById("ln" + i).textContent = AR(lv + 1);
      document.getElementById("lt" + i).textContent = L.title;
      document.getElementById("img" + i).style.filter = L.filter || '';
      SK.forEach(k => { const v = L.stats[k]; document.getElementById("sv" + i + k).textContent = AR(v); document.getElementById("sf" + i + k).style.width = v + "%"; });
      for (let p = 0; p <= MAX; p++) { const pip = document.getElementById("pip" + i + "_" + p); if (pip) pip.className = "pip" + (p < lv ? " done" : p === lv ? " on" : ""); }
      document.getElementById("bd" + i).disabled = lv === 0;
      document.getElementById("bu" + i).disabled = lv === MAX;
    }
    function go(i, d) {
      const s = states[i];
      const nLv = Math.max(0, Math.min(MAX, s.lv + d));
      if (nLv === s.lv) return;
      const up = nLv > s.lv; s.prev = s.lv; s.lv = nLv;
      const stg = document.getElementById("stg" + i);
      const img = document.getElementById("img" + i);
      const bgEl = document.getElementById("bg" + i);
      img.className = "char-img " + (up ? "xu" : "xd");
      bgEl.classList.remove("bg-in"); bgEl.classList.add("bg-out");
      setTimeout(() => {
        img.src = CHARS[i].levels[s.lv].img;
        img.style.filter = CHARS[i].levels[s.lv].filter || '';
        img.className = "char-img " + (up ? "eu" : "ed");
        bgEl.style.backgroundImage = "url('" + BGS[s.lv] + "')";
        bgEl.classList.remove("bg-out"); bgEl.classList.add("bg-in");
        setTimeout(() => bgEl.classList.remove("bg-in"), 600);
        const sw = document.createElement("div"); sw.className = "sweep"; stg.appendChild(sw); setTimeout(() => sw.remove(), 700);
        if (up) { const gb = document.createElement("div"); gb.className = "gburst"; stg.appendChild(gb); setTimeout(() => gb.remove(), 900); }
        const fl = document.createElement("div"); fl.className = "flv"; fl.textContent = (up ? "▲ المستوى " : "▼ المستوى ") + AR(s.lv + 1); stg.appendChild(fl); setTimeout(() => fl.remove(), 1400);
        setTimeout(() => { img.className = "char-img"; }, 400);
        sync(i);
      }, 280);
    }
  </script>
